version: "3.9"

services:
  db:
    image: postgres:16
    container_name: roomcms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
    ports:
      - "5432:5432"
    volumes:
      - roomcms_pg_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: roomcms-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - db
    # ВАЖНО: при переходе на env
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: devuser
      DB_PASSWORD: devpass
      DB_NAME: devdb

volumes:
  roomcms_pg_data: